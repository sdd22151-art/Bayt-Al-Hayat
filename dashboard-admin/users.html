<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users - Abrag Admin</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .table-card { background: var(--bg-surface); border-radius: 8px; padding: 1.5rem; border: 1px solid var(--border-color); overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; }
    .data-table th { padding: 0.875rem 1rem; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border-color); text-transform: uppercase; letter-spacing: 0.05em; }
    .data-table td { padding: 0.875rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--border-color); color: var(--text-main); vertical-align: middle; }
    .data-table tbody tr:hover { background: var(--bg-body); }
    .badge { padding: 0.2rem 0.65rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; display: inline-block; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-gray { background: #f3f4f6; color: #4b5563; }
    .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem; }
    .search-box { position: relative; min-width: 260px; }
    .search-box i { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-box input { padding-left: 2.4rem; width: 100%; }
    .btn-sm { padding: 0.3rem 0.65rem; border-radius: 5px; border: 1px solid; font-size: 0.78rem; cursor: pointer; font-weight: 500; transition: all 0.15s; }
    .btn-info { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .btn-info:hover { background: #bfdbfe; }
    .btn-warn { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .btn-warn:hover { background: #fde68a; }
    .btn-del { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .btn-del:hover { background: #fecaca; }
    .actions-cell { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-color); display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; margin-right: 0.5rem; font-weight: 600; }
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--bg-surface); border-radius: 12px; padding: 2rem; width: 620px; max-width: 95vw; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border-color); position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
    .modal-close:hover { color: var(--text-main); }
    .user-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin: 1rem 0; }
    .detail-field { background: var(--bg-body); border-radius: 6px; padding: 0.65rem 0.875rem; }
    .detail-field label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase; }
    .detail-field span { font-size: 0.875rem; color: var(--text-main); font-weight: 500; }
    .assess-list { margin-top: 1rem; }
    .assess-item { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.875rem; border-radius: 6px; background: var(--bg-body); margin-bottom: 0.4rem; font-size: 0.825rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .stats-row { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">ABRAG</div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><i class='bx bx-desktop'></i> Dashboard</a>
        <div class="nav-divider"></div>
        <a href="users.html" class="nav-item active"><i class='bx bx-group'></i> Users</a>
        <a href="assessments.html" class="nav-item"><i class='bx bx-book-open'></i> Assessments</a>
        <a href="videos.html" class="nav-item"><i class='bx bx-video'></i> Videos</a>
        <a href="payments.html" class="nav-item"><i class='bx bx-dollar-circle'></i> Payments</a>
        <a href="notifications.html" class="nav-item"><i class='bx bx-bell'></i> Notifications</a>
        <div class="nav-divider"></div>
        <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i> Settings</a>
        <div class="nav-divider"></div>
        <a href="#" class="nav-item nav-logout" onclick="logout()"><i class='bx bx-log-out'></i> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="btn-icon" id="toggleSidebar"><i class='bx bx-menu'></i></button>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="toggleTheme"><i class='bx bx-moon'></i></button>
          <div class="user-profile"><div class="avatar"><i class='bx bx-user'></i></div></div>
        </div>
      </header>

      <div class="dashboard-body">
        <div class="dashboard-header-info">
          <div class="breadcrumb"><strong>Users</strong> <span>|</span> User Management</div>
          <div id="statsRow" class="stats-row">Loading...</div>
        </div>

        <div class="table-card">
          <div class="table-controls">
            <h2 style="font-size: 1.1rem; font-weight: 600;">All Users</h2>
            <div class="search-box">
              <i class='bx bx-search'></i>
              <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email..." oninput="filterUsers()">
            </div>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Birth Info</th>
                <th>Assessments</th>
                <th>Joined</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="7" class="empty-state"><i class='bx bx-loader-alt bx-spin'></i>Loading users...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- User Details Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()"><i class='bx bx-x'></i></button>
      <h3 id="modalUserName" style="font-size: 1.1rem; margin-bottom: 0.25rem;"></h3>
      <p id="modalUserEmail" style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;"></p>

      <div class="user-detail-grid" id="modalDetails"></div>

      <div class="assess-list">
        <h4 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted);">ASSESSMENTS HISTORY</h4>
        <div id="modalAssessments"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
  <script>
    let allUsers = [];

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      fetchUsers();
    });

    const typeBadgeColors = {
      psychology: '#e0e7ff|#3730a3',
      neuroscience: '#dcfce7|#166534',
      letter: '#fef3c7|#92400e',
      astrology: '#fae8ff|#86198f',
      comprehensive: '#ffedd5|#9a3412'
    };

    const getTypeBadge = (type) => {
      const colors = typeBadgeColors[type] || '#f3f4f6|#374151';
      const [bg, color] = colors.split('|');
      return `<span style="background:${bg};color:${color};padding:0.15rem 0.5rem;border-radius:999px;font-size:0.72rem;font-weight:600;">${type}</span>`;
    };

    async function fetchUsers() {
      const tbody = document.getElementById('usersTableBody');
      try {
        const res = await apiFetch('/admin/users');
        if (!res) return;
        allUsers = await res.json();
        document.getElementById('statsRow').textContent = `${allUsers.length} total users · ${allUsers.filter(u => u.is_active).length} active`;
        renderUsers(allUsers);
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class='bx bx-error'></i>Failed to load users.</td></tr>`;
      }
    }

    function filterUsers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allUsers.filter(u =>
        `${u.fullname} ${u.email}`.toLowerCase().includes(q)
      );
      renderUsers(filtered);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class='bx bx-ghost'></i>No users found.</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => {
        const name = u.fullname || 'N/A';
        const initials = u.fullname ? u.fullname.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '?';
        const statusBadge = u.is_active
          ? `<span class="badge badge-success">Active</span>`
          : `<span class="badge badge-danger">Inactive</span>`;
        const date = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
        const birthInfo = [u.date_of_birth, u.place_of_birth].filter(Boolean).join(' · ') || '—';

        return `
          <tr>
            <td><div style="display:flex;align-items:center;"><div class="avatar-sm">${initials || '?'}</div><strong>${name}</strong></div></td>
            <td>${u.email}</td>
            <td style="font-size:0.8rem;color:var(--text-muted);">${birthInfo}</td>
            <td><span class="badge badge-gray">${u.assessment_count}</span></td>
            <td style="font-size:0.8rem;color:var(--text-muted);">${date}</td>
            <td>${statusBadge}</td>
            <td>
              <div class="actions-cell">
                <button class="btn-sm btn-info" onclick="viewUser('${u.id}')"><i class='bx bx-show'></i> View</button>
                <button class="btn-sm btn-warn" onclick="toggleStatus('${u.id}', '${name}')">${u.is_active ? '<i class=\'bx bx-block\'></i> Block' : '<i class=\'bx bx-check\'></i> Activate'}</button>
                <button class="btn-sm btn-del" onclick="deleteUser('${u.id}', '${name}')"><i class='bx bx-trash'></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function viewUser(userId) {
      const res = await apiFetch(`/admin/users/${userId}/details`);
      if (!res) return;
      const u = await res.json();

      document.getElementById('modalUserName').textContent = u.fullname;
      document.getElementById('modalUserEmail').textContent = u.email;

      document.getElementById('modalDetails').innerHTML = `
        <div class="detail-field"><label>Date of Birth</label><span>${u.date_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Place of Birth</label><span>${u.place_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Time of Birth</label><span>${u.time_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Status</label><span>${u.is_active ? '✅ Active' : '🔴 Inactive'}</span></div>
        <div class="detail-field"><label>Verified</label><span>${u.is_verified ? '✅ Yes' : '❌ No'}</span></div>
        <div class="detail-field"><label>Joined</label><span>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</span></div>
      `;

      const assessEl = document.getElementById('modalAssessments');
      if (!u.assessments || !u.assessments.length) {
        assessEl.innerHTML = `<p style="color:var(--text-muted);font-size:0.85rem;">No assessments yet.</p>`;
      } else {
        assessEl.innerHTML = u.assessments.map(a => `
          <div class="assess-item">
            <div>${getTypeBadge(a.type)} <span style="margin-left:0.5rem;color:var(--text-muted);font-size:0.8rem;">${new Date(a.created_at).toLocaleDateString()}</span></div>
            <div>${a.has_video ? '<span style="color:#16a34a;font-size:0.8rem;">🎬 Video</span>' : '<span style="color:var(--text-muted);font-size:0.8rem;">No video</span>'}</div>
          </div>
        `).join('');
      }

      document.getElementById('userModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('userModal').classList.remove('show');
    }

    document.getElementById('userModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    async function toggleStatus(userId, name) {
      if (!confirm(`Toggle active status for ${name}?`)) return;
      const res = await apiFetch(`/admin/users/${userId}/toggle-status`, { method: 'POST' });
      if (res && res.ok) fetchUsers();
      else alert('Failed to toggle status.');
    }

    async function deleteUser(userId, name) {
      if (!confirm(`⚠️ Delete user "${name}" and ALL their data? This cannot be undone.`)) return;
      const res = await apiFetch(`/admin/users/${userId}`, { method: 'DELETE' });
      if (res && res.ok) { fetchUsers(); }
      else alert('Failed to delete user.');
    }
  </script>
</body>
</html>
